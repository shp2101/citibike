<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citibike Live Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card-border: #2a2d3a;
    --accent-blue: #3b82f6;
    --accent-green: #22c55e;
    --accent-yellow: #eab308;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-bright: #f8fafc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--accent-blue); }

  .status-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .status-bar .live-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent-green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .areas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .area-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
    transition: border-color 0.3s;
  }

  .area-card:hover { border-color: var(--accent-blue); }

  .area-label {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 4px;
  }

  .area-sublabel {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 18px;
  }

  .station-block {
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .station-name {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .station-name .pin { color: var(--accent-blue); font-size: 0.9rem; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-box {
    text-align: center;
    padding: 10px 4px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
  }

  .stat-value {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .stat-ebike .stat-value { color: var(--accent-blue); }
  .stat-classic .stat-value { color: var(--text-dim); }
  .stat-docks .stat-value { color: var(--accent-green); }

  .rolling-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--card-border);
  }

  .rolling-title {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .rolling-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .rolling-stat {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
  }

  .rolling-icon {
    font-size: 1.1rem;
    width: 28px;
    text-align: center;
  }

  .rolling-info {
    flex: 1;
  }

  .rolling-value {
    font-size: 1.2rem;
    font-weight: 700;
  }

  .rolling-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-dim);
  }

  .rolling-picked .rolling-value { color: var(--accent-yellow); }
  .rolling-returned .rolling-value { color: var(--accent-purple); }

  .countdown {
    text-align: center;
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .countdown span { color: var(--accent-blue); font-weight: 600; }

  .error-banner {
    text-align: center;
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--accent-red);
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    display: none;
  }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  .loading .spinner {
    display: inline-block;
    width: 28px;
    height: 28px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .mini-chart {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 30px;
    margin-top: 8px;
  }

  .mini-chart-bar {
    flex: 1;
    min-width: 3px;
    border-radius: 2px 2px 0 0;
    transition: height 0.3s;
  }

  .mini-chart-bar.ebike { background: var(--accent-blue); opacity: 0.7; }
  .mini-chart-bar.dock { background: var(--accent-green); opacity: 0.7; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Citi</span>Bike Live</h1>
  <div class="status-bar">
    <span><span class="live-dot"></span>Live data</span>
    <span id="lastUpdate">Loading...</span>
    <span id="nextRefresh"></span>
  </div>
</div>

<div class="error-banner" id="errorBanner"></div>

<div id="dashboard">
  <div class="loading">
    <div class="spinner"></div><br>
    Connecting to Citibike...
  </div>
</div>

<div class="countdown" id="countdown"></div>

<script>
const POLL_INTERVAL = 15; // seconds
const ROLLING_WINDOW = 5 * 60; // 5 minutes in seconds

const AREAS = [
  {
    name: 'JS',
    stations: [
      { id: '66db8d89-0aca-11e7-82f6-3863bb44ef7c', name: 'Vesey Pl & River Terrace' },
      { id: '2170352212111402482', name: 'Vesey St & West St' }
    ]
  },
  {
    name: 'Home',
    stations: [
      { id: '66de63cd-0aca-11e7-82f6-3863bb44ef7c', name: 'Columbia St & Degraw St' },
      { id: '66ddee56-0aca-11e7-82f6-3863bb44ef7c', name: 'Henry St & Degraw St' },
      { id: '66ddeca9-0aca-11e7-82f6-3863bb44ef7c', name: 'Columbia St & Kane St' },
      { id: '66de44ba-0aca-11e7-82f6-3863bb44ef7c', name: 'Carroll St & Columbia St' }
    ]
  },
  {
    name: '277',
    stations: [
      { id: '66db90f1-0aca-11e7-82f6-3863bb44ef7c', name: 'Reade St & Broadway' }
    ]
  }
];

const STATUS_URL = 'https://gbfs.lyft.com/gbfs/2.3/bkn/en/station_status.json';

// History: { stationId: [ { time, ebikes, classic, docks } ] }
let history = {};
let countdownSec = POLL_INTERVAL;
let countdownTimer = null;

// Initialize history for all stations
AREAS.forEach(area => {
  area.stations.forEach(s => {
    history[s.id] = [];
  });
});

async function fetchStatus() {
  const res = await fetch(STATUS_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const map = {};
  json.data.stations.forEach(s => { map[s.station_id] = s; });
  return map;
}

function recordSnapshot(statusMap, now) {
  AREAS.forEach(area => {
    area.stations.forEach(s => {
      const st = statusMap[s.id];
      if (!st) return;
      const classic = (st.num_bikes_available || 0) - (st.num_ebikes_available || 0);
      history[s.id].push({
        time: now,
        ebikes: st.num_ebikes_available || 0,
        classic: classic,
        docks: st.num_docks_available || 0
      });
      // Trim history older than 10 minutes (keep buffer)
      const cutoff = now - 10 * 60 * 1000;
      history[s.id] = history[s.id].filter(h => h.time >= cutoff);
    });
  });
}

function computeRolling(stationId, now) {
  const entries = history[stationId];
  if (entries.length < 2) return { pickedUp: 0, returned: 0 };

  const windowStart = now - ROLLING_WINDOW * 1000;
  // Find the oldest entry within the window
  let oldest = null;
  for (const e of entries) {
    if (e.time >= windowStart) { oldest = e; break; }
  }
  if (!oldest) oldest = entries[entries.length - 2] || entries[0];
  const latest = entries[entries.length - 1];

  // Track e-bikes only
  const diff = latest.ebikes - oldest.ebikes;

  return {
    pickedUp: diff < 0 ? Math.abs(diff) : 0,
    returned: diff > 0 ? diff : 0
  };
}

function render(statusMap) {
  const now = Date.now();
  let html = '<div class="areas-grid">';

  AREAS.forEach(area => {
    // Compute area-level rolling totals
    let totalPickedUp = 0, totalReturned = 0;
    area.stations.forEach(s => {
      const r = computeRolling(s.id, now);
      totalPickedUp += r.pickedUp;
      totalReturned += r.returned;
    });

    const stationNames = area.stations.map(s => s.name).join(' + ');

    html += `<div class="area-card">`;
    html += `<div class="area-label">${area.name}</div>`;
    html += `<div class="area-sublabel">${stationNames}</div>`;

    area.stations.forEach(s => {
      const st = statusMap[s.id];
      if (!st) {
        html += `<div class="station-block"><span style="color:var(--accent-red)">Station offline</span></div>`;
        return;
      }

      const ebikes = st.num_ebikes_available || 0;
      const totalBikes = st.num_bikes_available || 0;
      const classic = totalBikes - ebikes;
      const docks = st.num_docks_available || 0;
      const capacity = totalBikes + docks + (st.num_bikes_disabled || 0) + (st.num_docks_disabled || 0);

      // Mini chart data (last 10 snapshots)
      const chartData = history[s.id].slice(-10);

      html += `<div class="station-block">`;
      html += `<div class="station-name"><span class="pin">&#x1F4CD;</span>${s.name}</div>`;
      html += `<div class="stats-row">`;
      html += `<div class="stat-box stat-ebike"><div class="stat-value">${ebikes}</div><div class="stat-label">E-Bikes</div></div>`;
      html += `<div class="stat-box stat-classic"><div class="stat-value">${classic}</div><div class="stat-label">Classic</div></div>`;
      html += `<div class="stat-box stat-docks"><div class="stat-value">${docks}</div><div class="stat-label">Open Docks</div></div>`;
      html += `</div>`;

      // Mini sparkline chart
      if (chartData.length > 1) {
        const maxVal = Math.max(...chartData.map(d => Math.max(d.ebikes, d.docks)), 1);
        html += `<div class="mini-chart">`;
        chartData.forEach(d => {
          const eH = Math.max(2, (d.ebikes / maxVal) * 28);
          html += `<div class="mini-chart-bar ebike" style="height:${eH}px" title="E-bikes: ${d.ebikes}"></div>`;
          const dH = Math.max(2, (d.docks / maxVal) * 28);
          html += `<div class="mini-chart-bar dock" style="height:${dH}px" title="Docks: ${d.docks}"></div>`;
        });
        html += `</div>`;
      }

      html += `</div>`;
    });

    // Rolling 5-min stats for the area
    html += `<div class="rolling-section">`;
    html += `<div class="rolling-title">E-Bikes &mdash; Last 5 Minutes</div>`;
    html += `<div class="rolling-stats">`;
    html += `<div class="rolling-stat rolling-picked">`;
    html += `<div class="rolling-icon">&#x1F6B4;</div>`;
    html += `<div class="rolling-info"><div class="rolling-value">${totalPickedUp}</div><div class="rolling-label">E-Bikes Picked Up</div></div>`;
    html += `</div>`;
    html += `<div class="rolling-stat rolling-returned">`;
    html += `<div class="rolling-icon">&#x1F17F;&#xFE0F;</div>`;
    html += `<div class="rolling-info"><div class="rolling-value">${totalReturned}</div><div class="rolling-label">E-Bikes Returned</div></div>`;
    html += `</div>`;
    html += `</div>`;
    html += `</div>`;

    html += `</div>`;
  });

  html += '</div>';
  document.getElementById('dashboard').innerHTML = html;
}

function updateStatusBar() {
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `Updated ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' })}`;
}

function startCountdown() {
  countdownSec = POLL_INTERVAL;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownSec--;
    if (countdownSec <= 0) countdownSec = POLL_INTERVAL;
    document.getElementById('countdown').innerHTML =
      `Next refresh in <span>${countdownSec}s</span>`;
  }, 1000);
}

async function refresh() {
  try {
    const statusMap = await fetchStatus();
    const now = Date.now();
    recordSnapshot(statusMap, now);
    render(statusMap);
    updateStatusBar();
    document.getElementById('errorBanner').style.display = 'none';
  } catch (err) {
    const banner = document.getElementById('errorBanner');
    banner.textContent = `Failed to fetch data: ${err.message}. Retrying...`;
    banner.style.display = 'block';
  }
  startCountdown();
}

// Initial load
refresh();
// Poll every 30 seconds
setInterval(refresh, POLL_INTERVAL * 1000);
</script>
</body>
</html>
